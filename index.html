<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComVi – Comunidad Viajera</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 520px;
      padding: 30px;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 25px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      font-weight: bold;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.95;
    }

    .muted {
      margin-top: 25px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="assets/logo.png" alt="ComVi" class="logo">

    <h1>Estamos desarrollando ComVi</h1>

    <p>
      Una nueva aplicación para la comunidad viajera.<br>
      Muy pronto vas a poder compartir viajes, conectar personas
      y organizar trayectos de manera simple y segura.
    </p>

    <div class="muted">
      ComVi · Comunidad Viajera Argentina
    </div>
  </div>

</body>
</html>
