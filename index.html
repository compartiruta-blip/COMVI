<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ComVi – Carpooling</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafafa;
}
header {
  background: #0d6efd;
  color: white;
  padding: 12px;
  text-align: center;
}
section {
  padding: 12px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}
button {
  background: #0d6efd;
  color: white;
  border: none;
}
.viaje {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
  box-shadow: 0 0 4px rgba(0,0,0,0.1);
}
.ad {
  background: #f0f0f0;
  padding: 10px;
  margin: 10px;
  text-align: center;
  border-radius: 8px;
  font-size: 14px;
}
footer {
  font-size: 12px;
  text-align: center;
  color: #666;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h2>🚗 ComVi</h2>
  <div>Carpooling comunitario</div>
</header>

<!-- PUBLICIDAD SUPERIOR -->
<div class="ad">
  <strong>Publicidad</strong><br>
  Servicio técnico · WhatsApp 11 5802-5832
</div>

<section>
  <h3>📍 Publicar viaje</h3>
  <input type="text" id="origen" placeholder="Origen">
  <input type="text" id="destino" placeholder="Destino">
  <input type="time" id="hora">
  <input type="tel" id="telefono"
       placeholder="Teléfono de contacto"
       inputmode="numeric">

<button type="button" onclick="publicarViaje()">Publicar</button>
</section>

<!-- DONACIÓN -->
<section>
  <a href="https://link.mercadopago.com.ar/donacomvi"
     target="_blank"
     style="display:block;padding:12px;background:#009ee3;color:white;
            text-align:center;border-radius:8px;">
    ❤️ Donar para sostener ComVi
  </a>
</section>

<!-- PUBLICIDAD MEDIA -->
<div class="ad">
  ¿Querés anunciar acá?<br>
  📧 <a href="mailto:admcomvi@gmail.com">admcomvi@gmail.com</a>
</div>

<section>
  <h3>🗺️ Viajes disponibles</h3>
  <div id="listaViajes"></div>
</section>

<footer>
  Visitas: <span id="contador"></span><br>
  MVP comunitario · Argentina
</footer>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
/* ===============================
   CONFIG SUPABASE
================================ */
const SUPABASE_URL = "https://koawnshgdqdqfkzppqpb.supabase.co";
const SUPABASE_KEY = "sb_publishable_yPOsphY0cx4OWRVFQkdcSA_jnsxj30b";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


/* ===============================
   CONTADOR LOCAL (MVP)
================================ */
let visitas = localStorage.getItem("visitas_comvi") || 0;
visitas++;
localStorage.setItem("visitas_comvi", visitas);
document.getElementById("contador").innerText = visitas;

/* ===============================
   MOSTRAR VIAJES
================================ */
async function mostrarViajes() {
  const { data, error } = await supabase
    .from("viajes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Error cargando viajes");
    return;
  }

  const contenedor = document.getElementById("listaViajes");
  contenedor.innerHTML = "";

  data.forEach(v => {
    const div = document.createElement("div");
    div.className = "viaje";
    div.innerHTML = `
      <strong>${v.origen} → ${v.destino}</strong><br>
      🕒 ${v.hora}<br>
      📞 <a href="tel:${v.telefono}">${v.telefono}</a>
    `;
    contenedor.appendChild(div);
  });
}

/* ===============================
   PUBLICAR VIAJE
================================ */
async function publicarViaje() {
  const origen = document.getElementById("origen").value.trim();
  const destino = document.getElementById("destino").value.trim();
  const hora = document.getElementById("hora").value;
  const telefono = document.getElementById("telefono").value.trim();

  if (!origen || !destino || !hora || !telefono) {
    alert("Completá todos los campos");
    return;
  }

  if (!/^[0-9]{10,15}$/.test(telefono)) {
    alert("Teléfono inválido");
    return;
  }

  const { error } = await supabase
    .from("viajes")
    .insert([
      { origen, destino, hora, telefono }
    ]);

  if (error) {
    alert("Error al publicar el viaje");
    console.error(error);
    return;
  }

  alert("Viaje publicado");
  location.reload();
}


/* ===============================
   INIT
================================ */
mostrarViajes();
</script>


</body>
</html>
