  function obtenerUserHash() {
  let hash = localStorage.getItem("comvi_user_hash");
  if (!hash) {
    hash = crypto.randomUUID();
    localStorage.setItem("comvi_user_hash", hash);
  }
  return hash;
}

const SUPABASE_URL = "https://koawnshgdqdqfkzppqpb.supabase.co";
const SUPABASE_KEY = "sb_publishable_yPOsphY0cx4OWRVFQkdcSA_jnsxj30b";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
/* ===============================
   VISITAS REALES
================================ */

// insertar una visita
async function registrarVisita() {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const geo = await res.json();

    const { error } = await sb
      .from("visitas")
      .insert([{
        ip: geo.ip,
        city: geo.city,
        region: geo.region,
        country: geo.country_name,
        latitude: geo.latitude,
        longitude: geo.longitude,
        user_hash: obtenerUserHash()
      }]);

    if (error) {
      console.error("Error guardando visita", error);
    }
  } catch (e) {
    console.error("Error obteniendo geolocalización", e);
  }
}



/* ===============================
   MOSTRAR VIAJES
================================ */

  alert(

    "Mientras tanto, el equipo de ComVi puede ponerte en contacto."
  );

  // futuro:

  // redirigir a WhatsApp API
}
function formatearFecha(fechaISO) {
  return new Date(fechaISO).toLocaleString("es-AR", {
    dateStyle: "short",
    timeStyle: "short"
  });
}
async function mostrarViajes() {
  const { data, error } = await sb
    .from("viajes")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    alert("Error cargando viajes");
    return;
  }

  const contenedor = document.getElementById("listaViajes");
  contenedor.innerHTML = "";

  data.forEach(v => {
  const div = document.createElement("div");
  div.className = "viaje";
  div.innerHTML = `
    <strong>${v.origen} → ${v.destino}</strong><br>
    🕒 ${formatearFecha(v.fecha_hora)}<br>
    📞 <button onclick="contactarConductor('${v.id}')">
  💬 Contactar conductor
</button>

  `;
  contenedor.appendChild(div);
});
}

/* ===============================
   PUBLICAR VIAJE
================================ */
async function publicarViaje() {
  const origen = document.getElementById("origen").value.trim();
  const destino = document.getElementById("destino").value.trim();
  const fecha = document.getElementById("fecha").value;
  const hora = document.getElementById("hora").value;
  const telefono = document.getElementById("telefono").value.trim();

  if (!origen || !destino || !fecha || !hora || !telefono) {
    alert("Completá todos los campos");
    return;
  }

  // unir fecha + hora en formato ISO válido
  const fechaHoraISO = new Date(`${fecha}T${hora}`).toISOString();

  const { error } = await sb
    .from("viajes")
    .insert([
      {
        origen,
        destino,
        fecha_hora: fechaHoraISO,
        telefono
      }
    ]);

  if (error) {
    console.error("SUPABASE ERROR:", error);
    alert("Error al publicar");
    return;
  }

  alert("Viaje publicado");
  mostrarViajes();
}
