<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComVi · Accediendo…</title>
  <style>
    body { font-family: Arial, sans-serif; background:#fafafa; margin:0; }
    main { max-width: 520px; margin: 0 auto; padding: 20px; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px; }
    .muted { color:#666; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div>ComVi</div>
      <p class="muted" id="msg">Procesando login…</p>
    </div>
  </main>

  <script src="../config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="../auth.js"></script>
  <script>
    const msg = document.getElementById("msg");

    (async () => {
      const params = new URLSearchParams(window.location.search);
      let next = params.get("next") || localStorage.getItem("comvi_next") || "/COMVI/index.html";
      localStorage.removeItem("comvi_next");

      // Normalizar next para que SIEMPRE sea navegable desde /auth/
      if (!next) next = "/COMVI/index.html";

      // Si viene absoluto, lo dejamos.
      // Si viene como "/COMVI/..." lo dejamos.
      // Si viene como "admin.html" o "../admin.html" lo convertimos a "/COMVI/admin.html".
      if (next.startsWith("http")) {
        // ok
      } else if (next.startsWith("/")) {
        // ok (ej: /COMVI/admin.html)
      } else {
        // quitar ../ o ./
        next = next.replace(/^(\.\.\/)+/, "").replace(/^(\.\/)+/, "");
        next = "/COMVI/" + next;
      }

      // Anti-bug: nunca volver a /auth/ por next
      if (next.includes("/auth/")) next = "/COMVI/index.html";


      // En OAuth, supabase-js termina de guardar la sesión automáticamente al volver.
      // Solo chequeamos que ya exista y redirigimos.
      const { data: { session }, error } = await COMVI_AUTH.sb.auth.getSession();

      if (error) console.error(error);

      if (!session) {
        msg.textContent = "No se detectó sesión. Si esto se repite, faltan Redirect URLs en Supabase.";
        // fallback
        setTimeout(() => window.location.href = "../login.html?next=" + encodeURIComponent(next), 1200);
        return;
      }

      msg.textContent = "Listo. Redirigiendo…";
      setTimeout(() => window.location.href = (next.startsWith("http") ? next : (window.location.origin + next)), 300);

    })();
  </script>
</body>
</html>
